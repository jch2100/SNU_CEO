<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#071421">
  <title>AI 자서전 플립북</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="vendor/page-flip.browser.js"></script>
  <style>
    :root {
      --navy: #0b1d32;
      --navy-deep: #071421;
      --paper: #fffdf8;
      --ink: #2d2a26;
      --muted: #756f65;
      --brass: #c8a86b;
      --sky: #6f8fb5;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      color: #f6f0e4;
      background:
        radial-gradient(circle at 50% 8%, rgba(112, 143, 181, .18), transparent 36rem),
        var(--navy-deep);
      font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
      overflow-x: hidden;
    }
    button, a { font: inherit; }
    button { color: inherit; }
    button:focus-visible, a:focus-visible { outline: 2px solid var(--brass); outline-offset: 3px; }

    #intro {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 34px 20px;
      text-align: center;
      transition: opacity .55s ease, visibility .55s ease;
    }
    #intro.hidden { opacity: 0; visibility: hidden; position: fixed; inset: 0; }
    .intro-wrap { width: min(92vw, 430px); }
    .book-stage { perspective: 1300px; margin-bottom: 26px; }
    .book-object {
      position: relative;
      width: min(72vw, 330px);
      aspect-ratio: 1600 / 2480;
      margin: 0 auto;
      transform: rotateY(-13deg) rotateX(2deg);
      transform-style: preserve-3d;
      filter: drop-shadow(25px 28px 32px rgba(0, 0, 0, .48));
      transition: transform .45s ease;
    }
    .book-stage:hover .book-object { transform: rotateY(-7deg) translateY(-4px); }
    .book-object::before {
      content: "";
      position: absolute;
      z-index: -1;
      top: 5px;
      right: -15px;
      width: 18px;
      height: calc(100% - 10px);
      border-radius: 0 4px 4px 0;
      background: repeating-linear-gradient(90deg, #eee5d4 0 2px, #cfc3ad 2px 3px);
      transform: translateZ(-3px);
    }
    .book-object img { display: block; width: 100%; height: 100%; object-fit: cover; border-radius: 3px 1px 1px 3px; }
    .intro-kicker { margin: 0 0 6px; color: var(--brass); font-size: 13px; letter-spacing: .2em; }
    .intro-title { margin: 0; font-family: "Noto Serif KR", Batang, serif; font-size: clamp(24px, 5vw, 34px); line-height: 1.35; }
    .intro-author { margin: 10px 0 22px; color: rgba(255, 255, 255, .7); }
    #openBook {
      min-width: 170px;
      padding: 12px 22px;
      border: 1px solid rgba(255, 255, 255, .36);
      background: rgba(255, 255, 255, .08);
      cursor: pointer;
      transition: background .2s ease, border-color .2s ease;
    }
    #openBook:hover { background: rgba(255, 255, 255, .15); border-color: var(--brass); }

    #scene { display: none; min-height: 100vh; }
    #scene.active { display: block; }
    header {
      min-height: 68px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 18px;
      padding: 0 24px;
      border-bottom: 1px solid rgba(255, 255, 255, .14);
      background: rgba(7, 20, 33, .88);
      backdrop-filter: blur(12px);
    }
    header a { min-height: 44px; display: inline-flex; align-items: center; justify-self: start; color: inherit; text-decoration: none; font-size: 14px; }
    header strong { font-family: "Noto Serif KR", Batang, serif; font-size: 18px; text-align: center; }
    #bookAuthor { justify-self: end; color: rgba(255, 255, 255, .67); font-size: 14px; }
    main { min-height: calc(100vh - 68px); display: grid; place-items: center; padding: 26px 12px 92px; }
    #book { margin: auto; }

    .page {
      width: 620px;
      height: 877px;
      overflow: hidden;
      color: var(--ink);
      background: var(--paper);
      box-shadow: inset 0 0 30px rgba(95, 78, 53, .06);
    }
    .page-inner { position: relative; width: 100%; height: 100%; padding: 64px 58px 70px; overflow: hidden; }
    .page-cover { background: #eee9df; }
    .page-cover .page-inner { padding: 0; }
    .page-cover img { display: block; width: 100%; height: 100%; object-fit: cover; }
    .page-title .page-inner { display: flex; flex-direction: column; justify-content: center; text-align: center; padding-inline: 72px; }
    .title-label { margin: 0 0 22px; color: var(--sky); font-size: 13px; letter-spacing: .24em; }
    .title-main { margin: 0; font-family: "Noto Serif KR", Batang, serif; font-size: 42px; line-height: 1.45; font-weight: 600; word-break: keep-all; }
    .title-rule { width: 46px; height: 1px; margin: 30px auto; background: var(--brass); }
    .title-sub { margin: 0; color: var(--muted); font-family: "Noto Serif KR", Batang, serif; font-size: 16px; line-height: 1.8; word-break: keep-all; }
    .title-author { margin: 34px 0 0; font-weight: 600; letter-spacing: .15em; }

    .toc-title { margin: 0 0 32px; font-family: "Noto Serif KR", Batang, serif; font-size: 30px; }
    .toc-list { list-style: none; margin: 0; padding: 0; }
    .toc-list li { display: grid; grid-template-columns: 34px 1fr; gap: 14px; align-items: baseline; padding: 10px 0; border-bottom: 1px solid #e8e0d2; }
    .toc-index { color: var(--sky); font-size: 12px; letter-spacing: .08em; }
    .toc-text { font-family: "Noto Serif KR", Batang, serif; font-size: 15px; line-height: 1.45; word-break: keep-all; }

    .section-kicker { margin: 0 0 12px; color: var(--sky); font-size: 11px; font-weight: 600; letter-spacing: .16em; text-transform: uppercase; }
    .section-title { margin: 0 0 28px; padding-bottom: 20px; border-bottom: 1px solid #d8c9ad; font-family: "Noto Serif KR", Batang, serif; font-size: 27px; line-height: 1.45; font-weight: 600; word-break: keep-all; }
    .section-continuation { margin: -18px 0 25px; color: #968a79; font-family: "Noto Serif KR", Batang, serif; font-size: 12px; letter-spacing: .06em; }
    .body-copy p { margin: 0 0 13px; font-family: "Noto Serif KR", Batang, serif; font-size: 16px; line-height: 1.86; letter-spacing: -.01em; word-break: keep-all; overflow-wrap: break-word; white-space: pre-line; }
    .body-copy p.lead::first-letter { float: left; margin: 7px 8px 0 0; color: var(--sky); font-size: 42px; line-height: .8; font-weight: 600; }
    .body-copy.compact p { font-size: 16px; line-height: 1.65; margin-bottom: 8px; }
    .page-num { position: absolute; bottom: 26px; left: 0; width: 100%; color: #a79c8b; font-family: "Noto Sans KR", sans-serif; font-size: 11px; text-align: center; }

    .page-back { color: #f7f0e2; background: linear-gradient(145deg, #2e4357, #122539 64%, #0b1d32); }
    .page-back .page-inner { display: flex; flex-direction: column; justify-content: center; align-items: center; padding-inline: 78px; text-align: center; }
    .back-quote { margin: 0; font-family: "Noto Serif KR", Batang, serif; font-size: 28px; line-height: 1.75; word-break: keep-all; }
    .back-rule { width: 42px; height: 1px; margin: 32px 0; background: var(--brass); }
    .back-author { color: rgba(255, 255, 255, .72); letter-spacing: .2em; }

    #status { color: rgba(255, 255, 255, .7); text-align: center; }
    .error { max-width: 620px; padding: 28px; border: 1px solid rgba(255, 255, 255, .2); line-height: 1.7; }
    .controls {
      position: fixed;
      z-index: 20;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, .2);
      background: rgba(7, 20, 33, .9);
      backdrop-filter: blur(10px);
    }
    .controls button { min-width: 44px; min-height: 44px; border: 1px solid rgba(255, 255, 255, .24); background: transparent; cursor: pointer; }
    .controls button:hover { border-color: var(--brass); background: rgba(255, 255, 255, .08); }
    #pageCount { min-width: 88px; font-size: 13px; text-align: center; }
    #measureStage { position: fixed; z-index: -100; top: 0; left: -10000px; width: 620px; height: 877px; visibility: hidden; }
    #measureStage .page { box-shadow: none; }

    @media (max-width: 640px) {
      header { grid-template-columns: 1fr auto; min-height: 60px; padding: 0 14px; }
      header strong { font-size: 15px; }
      #bookAuthor { display: none; }
      main { min-height: calc(100vh - 60px); padding-inline: 6px; }
      .controls { bottom: 10px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition-duration: .01ms !important; animation-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <section id="intro" aria-live="polite">
    <div class="intro-wrap">
      <div class="book-stage">
        <div class="book-object"><img id="introCover" alt="자서전 표지"></div>
      </div>
      <p class="intro-kicker">AI AUTOBIOGRAPHY</p>
      <h1 class="intro-title" id="introTitle">책을 불러오고 있습니다</h1>
      <p class="intro-author" id="introAuthor"></p>
      <button type="button" id="openBook" disabled>책 펼쳐보기</button>
    </div>
  </section>

  <section id="scene" aria-label="자서전 플립북">
    <header>
      <a href="../1st/index.html">← 1기 수료 기념관</a>
      <strong id="bookTitle">AI 자서전</strong>
      <span id="bookAuthor"></span>
    </header>
    <main>
      <div id="book"></div>
      <p id="status">책장을 정리하고 있습니다.</p>
    </main>
    <div class="controls" aria-label="페이지 이동">
      <button type="button" id="prev" aria-label="이전 페이지">←</button>
      <span id="pageCount">- / -</span>
      <button type="button" id="next" aria-label="다음 페이지">→</button>
    </div>
  </section>
  <div id="measureStage" aria-hidden="true"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const id = params.get("id");
    const bookRoot = document.getElementById("book");
    const measureStage = document.getElementById("measureStage");
    let pageFlip;
    let bookData;
    let contentPageNumber = 1;

    function element(tag, className, text) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (text !== undefined) node.textContent = text;
      return node;
    }

    function makePage(extraClass = "") {
      const page = element("div", `page ${extraClass}`.trim());
      const inner = element("div", "page-inner");
      page.appendChild(inner);
      return { page, inner };
    }

    function makeCover() {
      const { page, inner } = makePage("page-cover");
      page.dataset.density = "hard";
      const image = document.createElement("img");
      image.src = bookData.cover;
      image.alt = `${bookData.title} 표지`;
      inner.appendChild(image);
      return page;
    }

    function makeTitlePage() {
      const { page, inner } = makePage("page-title");
      inner.append(
        element("p", "title-label", "AUTOBIOGRAPHY"),
        element("h2", "title-main", bookData.title),
        element("div", "title-rule"),
        element("p", "title-sub", bookData.subtitle),
        element("p", "title-author", bookData.author)
      );
      return page;
    }

    function makeTocPage() {
      const { page, inner } = makePage();
      inner.appendChild(element("h2", "toc-title", "차례"));
      const list = element("ol", "toc-list");
      bookData.sections.forEach((section, index) => {
        const item = element("li");
        item.append(
          element("span", "toc-index", String(index + 1).padStart(2, "0")),
          element("span", "toc-text", section.title)
        );
        list.appendChild(item);
      });
      inner.appendChild(list);
      return page;
    }

    function newContentPage(section, continuation) {
      const { page, inner } = makePage();
      const body = element("div", "body-copy");
      if (continuation) {
        body.appendChild(element("p", "section-continuation", section.title));
      } else {
        body.append(
          element("p", "section-kicker", "LIFE STORY"),
          element("h2", "section-title", section.title)
        );
      }
      inner.append(body, element("span", "page-num", String(contentPageNumber++)));
      return { page, inner, body, paragraphCount: 0 };
    }

    function overflows(inner) {
      return inner.scrollHeight > inner.clientHeight + 1;
    }

    function paginateSection(section) {
      const pages = [];
      let current = newContentPage(section, false);
      measureStage.appendChild(current.page);

      section.paragraphs.forEach((text, index) => {
        const paragraph = element("p", index === 0 ? "lead" : "", text);
        current.body.appendChild(paragraph);
        if (!overflows(current.inner)) {
          current.paragraphCount += 1;
          return;
        }

        current.body.removeChild(paragraph);
        if (current.paragraphCount > 0) {
          measureStage.removeChild(current.page);
          pages.push(current.page);
          current = newContentPage(section, true);
          measureStage.appendChild(current.page);
          current.body.appendChild(paragraph);
          current.paragraphCount = 1;
        } else {
          current.body.classList.add("compact");
          current.body.appendChild(paragraph);
          current.paragraphCount = 1;
        }
      });

      measureStage.removeChild(current.page);
      pages.push(current.page);
      return pages;
    }

    function makeBackCover() {
      const { page, inner } = makePage("page-back");
      page.dataset.density = "hard";
      inner.append(
        element("p", "back-quote", bookData.backQuote || bookData.title),
        element("div", "back-rule"),
        element("p", "back-author", bookData.author)
      );
      return page;
    }

    async function buildBook() {
      await document.fonts.ready;
      const pages = [makeCover(), makeTitlePage(), makeTocPage()];
      for (const section of bookData.sections) {
        pages.push(...paginateSection(section));
        await new Promise(resolve => requestAnimationFrame(resolve));
      }
      pages.push(makeBackCover());
      pages.forEach(page => bookRoot.appendChild(page));
      measureStage.remove();
      return pages.length;
    }

    function updateCounter() {
      if (!pageFlip) return;
      document.getElementById("pageCount").textContent = `${pageFlip.getCurrentPageIndex() + 1} / ${pageFlip.getPageCount()}`;
    }

    function initPageFlip() {
      pageFlip = new St.PageFlip(bookRoot, {
        width: 620,
        height: 877,
        size: "stretch",
        minWidth: 300,
        maxWidth: 620,
        minHeight: 424,
        maxHeight: 877,
        showCover: true,
        usePortrait: true,
        mobileScrollSupport: true,
        maxShadowOpacity: .32,
        flippingTime: 700,
        drawShadow: true
      });
      pageFlip.loadFromHTML(document.querySelectorAll("#book > .page"));
      pageFlip.on("flip", updateCounter);
      pageFlip.on("changeOrientation", updateCounter);
      updateCounter();
      document.getElementById("status").hidden = true;
    }

    async function init() {
      try {
        if (!id || !/^[a-z0-9-]+$/.test(id)) throw new Error("올바른 작품 ID가 없습니다.");
        const response = await fetch(`books/${id}.json`, { cache: "no-store" });
        if (!response.ok) throw new Error("자서전 데이터를 불러오지 못했습니다.");
        bookData = await response.json();
        document.title = `${bookData.title} — ${bookData.author}`;
        document.getElementById("introCover").src = bookData.cover;
        document.getElementById("introCover").alt = `${bookData.title} 표지`;
        document.getElementById("introTitle").textContent = bookData.title;
        document.getElementById("introAuthor").textContent = `${bookData.author} 자서전`;
        document.getElementById("bookTitle").textContent = bookData.title;
        document.getElementById("bookAuthor").textContent = bookData.author;
        await buildBook();
        document.getElementById("openBook").disabled = false;
      } catch (error) {
        document.getElementById("introTitle").textContent = "책을 열 수 없습니다";
        document.getElementById("introAuthor").textContent = error.message;
        document.getElementById("openBook").hidden = true;
      }
    }

    document.getElementById("openBook").addEventListener("click", () => {
      document.getElementById("intro").classList.add("hidden");
      document.getElementById("scene").classList.add("active");
      initPageFlip();
    });
    document.getElementById("prev").addEventListener("click", () => pageFlip?.flipPrev());
    document.getElementById("next").addEventListener("click", () => pageFlip?.flipNext());
    window.addEventListener("keydown", event => {
      if (event.key === "ArrowLeft") pageFlip?.flipPrev();
      if (event.key === "ArrowRight") pageFlip?.flipNext();
    });
    init();
  </script>
</body>
</html>
